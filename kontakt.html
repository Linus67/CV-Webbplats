  <section class="col-md-6 mx-auto">
  <h2 class="mb-4 text-center">Kontakta mig</h2>
  <form id="contact-form">
    <div class="mb-3">
      <label for="name" class="form-label" >Namn</label>
      <input type="text" class="form-control" id="name" name="name" placeholder="Ditt namn" required>
    </div>
    <div class="mb-3">
      <label for="email" class="form-label" >E-post</label>
      <input type="email" class="form-control" id="email" name="email" placeholder="din@email.com" required>
    </div>
    <div class="mb-3">
      <label for="message" class="form-label" >Meddelande</label>
      <textarea class="form-control" id="message" name="message" rows="5" placeholder="Skriv ditt meddelande här" required></textarea>
    </div>
    <input type="text" name="_gotcha" style="display:none">
    <button type="submit" class="btn btn-primary w-100" id="submit-btn">
      Skicka
    </button>
    <div id="form-message" class="mt-2 text-center"></div>
  </form>
</section>
